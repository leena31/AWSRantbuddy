name: Mirror to CodeCommit

on:
  push:
    branches: [ main ] # This mirrors every push to your main branch

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gets the whole history, not just the latest file

      - name: Push to CodeCommit
        env:
          CC_USER: ${{ secrets.CC_USERNAME }}
          CC_PASS: ${{ secrets.CC_PASSWORD }}
          # REPLACE the URL below with your actual CodeCommit HTTPS URL
          CC_URL: https://git-codecommit.eu-west-1.amazonaws.com/v1/repos/RantbuddyRepo
        run: |
          # This builds a URL that includes your login info automatically
          REMOTE_URL=$(echo $CC_URL | sed "s/https:\/\//https://$CC_USER:$CC_PASS@/")
          git push --mirror "$REMOTE_URL"