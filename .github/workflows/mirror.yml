name: Mirror to CodeCommit

on:
  push:
    branches: [ main, master ] # Mirror these branches to AWS

jobs:
  mirror_to_codecommit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: gets all history/branches for mirroring

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Your CodeCommit region

      - name: Sync to CodeCommit
        run: |
          # Define your repository name
          REPO_NAME="rantbuddy-backend"
          
          # Set up the CodeCommit helper (standard for Mac/Linux)
          git config --global credential.helper '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true
          
          # Add CodeCommit as a remote and force push
          git remote add sync https://git-codecommit.${{ secrets.AWS_REGION }}.amazonaws.com/v1/repos/$REPO_NAME
          git push sync --mirror