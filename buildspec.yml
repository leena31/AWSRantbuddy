version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21 # Ensure this matches your Spring Boot Java version
  pre_build:
    commands:
      - echo "Setting executable permissions for Maven wrapper..."
      - chmod +x mvnw
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/rantbuddy-backend
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo "Build started on `date`"
      - echo "Compiling Spring Boot application..."
      - ./mvnw clean package -DskipTests
      - echo "Building the Docker image (Native ARM64)..."
      # Only ONE dot at the end. No platform flag needed if CodeBuild is set to ARM.
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo "Build completed on `date`"
      - echo "Pushing the Docker images to ECR..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Writing image definitions file for ECS..."
      # Ensure 'rantbuddy-container' matches the name in your ECS Task Definition
      - printf '[{"name":"rantbuddy-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
